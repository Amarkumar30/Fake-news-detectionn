name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest flake8

      - name: Lint backend and tests
        run: flake8 backend tests backend/tests

      - name: Run pytest
        env:
          PYTHONPATH: backend
        run: pytest tests backend/tests -q
